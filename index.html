<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <!-- ===== FAVICON ===== -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#132f66">
  <meta name="msapplication-TileColor" content="#132f66">
  <meta name="theme-color" content="#132f66">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitale Progressive School - Excellence in Education</title>
  <meta name="description" content="Kitale Progressive School offers excellence in education with holistic development and safe boarding environment since 2004.">
  
  <!-- ===== PRECONNECT ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  
  <!-- ===== PRELOAD LCP IMAGE ===== -->
  <link rel="preload" as="image" href="/images/gate3.jpg" fetchpriority="high" media="(min-width: 768px)">
  <link rel="preload" as="image" href="/images/gate3-mobile.jpg" fetchpriority="high" media="(max-width: 767px)">
  
  <!-- ===== FONT AWESOME 6 (Critical - Load immediately) ===== -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <!-- ===== BOOTSTRAP ICONS ===== -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- ===== BOOTSTRAP CSS ===== -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  
  <!-- ===== GOOGLE FONTS ===== -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- ===== THEME CSS ===== -->
  <link rel="stylesheet" href="/src/theme.css">
  
  <!-- ===== INLINE CRITICAL CSS ===== -->
  <style>
    :root {
      --navy: #0d65fb;
      --navy-dark: #0a55d6;
      --navy-light: #2675ff;
      --gold: #ff0080;
      --gold-dark: #e60073;
      --white: #fefefe;
      --gray-light: #f8f9fa;
      --text-dark: #000000;
      --gradient-primary: linear-gradient(135deg, #031739, #2675ff);
      --gradient-hover: linear-gradient(135deg, #031c45, #1a6bff);
      --gradient-dark: linear-gradient(135deg, #021331, #0d65fb);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Montserrat', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Ensure icons display properly */
    .fas, .far, .fab, .fa, .bi {
      display: inline-block;
      font-style: normal;
      font-variant: normal;
      text-rendering: auto;
      line-height: 1;
    }
    
    /* Test if Font Awesome loaded */
    .fa-smile-wink::before {
      content: "\f4e8";
    }
  </style>
  
  <!-- ===== VITE ENTRY ===== -->
  <script type="module" src="/src/main.jsx" defer></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
